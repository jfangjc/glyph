<section id="document-surface" class="document-surface" aria-label="Editor">
    <input id="document-title" class="document-title" aria-label="Document title" value="Untitled" />
    <div id="editor" class="block-editor" contenteditable="true" role="textbox" aria-label="Document blocks">
        <article class="block" data-block data-type="paragraph">
            <input class="todo-checkbox" type="checkbox" aria-label="Todo complete" contenteditable="false" />
            <div class="block-content" aria-label="Paragraph block"></div>
        </article>
    </div>
    <aside id="latex-preview" class="latex-preview" aria-label="PDF preview" contenteditable="false">
        <iframe id="latex-pdf-frame" class="latex-pdf-frame" title="PDF preview"></iframe>
        <div id="latex-preview-status" class="latex-preview-status" role="status"></div>
    </aside>
</section>

<template id="block-template">
    <article class="block" data-block data-type="paragraph">
        <input class="todo-checkbox" type="checkbox" aria-label="Todo complete" contenteditable="false" />
        <div class="block-content" aria-label="Paragraph block"></div>
    </article>
</template>
