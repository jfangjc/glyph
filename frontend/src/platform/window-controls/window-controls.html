<div id="app-titlebar" class="app-titlebar" hidden>
    <nav class="app-menu-bar" role="menubar" aria-label="Application menu">
        <div class="app-menu" data-app-menu>
            <button class="app-menu-button" type="button" role="menuitem" aria-haspopup="true" aria-expanded="false" data-menu-button="file">
                File
            </button>
            <div class="app-menu-panel" role="menu" data-menu-panel="file" hidden>
                <button class="app-menu-item" type="button" role="menuitem" data-app-command="file:new">
                    <span>New</span>
                </button>
                <button class="app-menu-item" type="button" role="menuitem" data-app-command="file:open">
                    <span>Open File...</span>
                </button>
                <button class="app-menu-item" type="button" role="menuitem" data-app-command="file:open-directory">
                    <span>Open Directory...</span>
                </button>
                <div class="app-menu-separator" role="separator"></div>
                <button class="app-menu-item" type="button" role="menuitem" data-app-command="file:save">
                    <span>Save</span>
                </button>
                <button class="app-menu-item" type="button" role="menuitem" data-app-command="file:save-as">
                    <span>Save As...</span>
                </button>
                <button class="app-menu-item" type="button" role="menuitem" data-app-command="file:export" disabled>
                    <span>Export PDF...</span>
                </button>
            </div>
        </div>
        <div class="app-menu" data-app-menu>
            <button class="app-menu-button" type="button" role="menuitem" aria-haspopup="true" aria-expanded="false" data-menu-button="edit">
                Edit
            </button>
            <div class="app-menu-panel" role="menu" data-menu-panel="edit" hidden>
                <button class="app-menu-item" type="button" role="menuitem" data-app-command="edit:undo">
                    <span>Undo</span>
                </button>
                <button class="app-menu-item" type="button" role="menuitem" data-app-command="edit:redo">
                    <span>Redo</span>
                </button>
                <div class="app-menu-separator" role="separator"></div>
                <button class="app-menu-item" type="button" role="menuitem" data-app-command="edit:cut">
                    <span>Cut</span>
                </button>
                <button class="app-menu-item" type="button" role="menuitem" data-app-command="edit:copy">
                    <span>Copy</span>
                </button>
                <button class="app-menu-item" type="button" role="menuitem" data-app-command="edit:paste">
                    <span>Paste</span>
                </button>
                <div class="app-menu-separator" role="separator"></div>
                <button class="app-menu-item" type="button" role="menuitem" data-app-command="edit:select-all">
                    <span>Select All</span>
                </button>
                <button class="app-menu-item" type="button" role="menuitem" data-app-command="edit:find">
                    <span>Find...</span>
                </button>
                <button class="app-menu-item" type="button" role="menuitem" data-app-command="edit:replace">
                    <span>Replace...</span>
                </button>
            </div>
        </div>
        <div class="app-menu" data-app-menu>
            <button class="app-menu-button" type="button" role="menuitem" aria-haspopup="true" aria-expanded="false" data-menu-button="view">
                View
            </button>
            <div class="app-menu-panel" role="menu" data-menu-panel="view" hidden>
                <button class="app-menu-item" type="button" role="menuitem" data-app-command="view:toggle-file-tree">
                    <span>Toggle File Tree</span>
                </button>
                <div class="app-menu-separator" role="separator"></div>
                <button class="app-menu-item" type="button" role="menuitem" data-app-command="view:zoom-in">
                    <span>Zoom In</span>
                </button>
                <button class="app-menu-item" type="button" role="menuitem" data-app-command="view:zoom-out">
                    <span>Zoom Out</span>
                </button>
                <button class="app-menu-item" type="button" role="menuitem" data-app-command="view:zoom-reset">
                    <span>Reset Zoom</span>
                </button>
            </div>
        </div>
        <div class="app-menu" data-app-menu>
            <button class="app-menu-button" type="button" role="menuitem" aria-haspopup="true" aria-expanded="false" data-menu-button="help">
                Help
            </button>
            <div class="app-menu-panel" role="menu" data-menu-panel="help" hidden>
                <button class="app-menu-item" type="button" role="menuitem" data-app-command="help:about">
                    <span>About Glyph</span>
                </button>
            </div>
        </div>

    <div class="app-drag-region" aria-hidden="true"></div>
    <div id="app-window-controls" class="app-window-controls" role="toolbar" aria-label="Window controls" hidden>
        <button class="window-control" type="button" data-window-action="minimise" aria-label="Minimize">
            <span class="window-control-icon" aria-hidden="true">&#xE921;</span>
        </button>
        <button id="app-maximise-button" class="window-control" type="button" data-window-action="maximise" aria-label="Maximize">
            <span class="window-control-icon" aria-hidden="true">&#xE922;</span>
        </button>
        <button class="window-control window-control-close" type="button" data-window-action="close" aria-label="Close">
            <span class="window-control-icon" aria-hidden="true">&#xE8BB;</span>
        </button>
    </div>
</div>
